name: Daily Crawl

on:
  # 매일 KST 00:00 = UTC 15:00
  schedule:
    - cron: '0 15 * * *'
  # 수동 트리거 (GitHub Actions 탭에서 "Run workflow" 버튼)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write  # 파일 커밋에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run crawler
        run: pnpm crawl
        timeout-minutes: 5

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races.json
          # 변경이 없으면 커밋하지 않음
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update race data [skip ci]"
            git push
          fi
